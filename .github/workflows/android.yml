name: Android server jar

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "scripts/fetch-scrcpy-server.ps1"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - "scripts/fetch-scrcpy-server.ps1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch scrcpy server jar
        shell: pwsh
        run: pwsh -File scripts/fetch-scrcpy-server.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrcpy-server
          path: android/prebuilt/scrcpy-server-*
          if-no-files-found: error
